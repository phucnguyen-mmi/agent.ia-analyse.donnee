<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Agent IA Marketing</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #2c3e50; }
        textarea { width: 100%; background: #f4f4f4; padding: 15px; border-radius: 8px; }
        img { width: 100%; border-radius: 8px; margin-top: 20px; }
        button { background: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-pdf { display: inline-block; margin-top: 15px; background: #c0392b; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-family: Arial, sans-serif; }
        .btn-logout { float: right; background: none; color: #999; border: 1px solid #ccc; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; text-decoration: none; }
        .btn-historique { display: inline-block; margin-top: 20px; color: #2c3e50; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <a href="/logout" class="btn-logout">Déconnexion</a>
    <h1>🤖 Agent IA - Analyse Marketing</h1>
    <a href="/historique" class="btn-historique">📋 Voir l'historique des analyses</a>
    <form method="POST" enctype="multipart/form-data">
        <p>Upload ton fichier CSV :</p>
        <input type="file" name="csv" accept=".csv" required>
        <br><br>
        <button type="submit">Analyser</button>
    </form>

    {% if analyse %}
        <h2>📊 Analyse :</h2>
        <textarea rows="15" readonly>{{ analyse }}</textarea>
        <br>
        <a href="/telecharger-pdf" class="btn-pdf">⬇ Télécharger le rapport PDF</a>
    {% endif %}

    {% if graphique %}
        <h2>📈 Graphique :</h2>
        <img src="data:image/png;base64,{{ graphique }}" alt="Graphique">
    {% endif %}
</body>
</html>
